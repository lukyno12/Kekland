<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Keksland: Grafická Legenda</title>
    <style>
        :root {
            --pixel-size: 4px;
            --font: 'Courier New', monospace;
        }

        body { background: #333; color: #000; font-family: var(--font); margin: 0; overflow: hidden; }

        /* HERNÉ OKNO */
        #game-viewport {
            width: 100vw; height: 100vh;
            display: flex; flex-direction: column;
            background: #fff; max-width: 500px; margin: 0 auto;
            border: 5px solid #000; box-sizing: border-box;
        }

        /* MAPA S TERÉNOM */
        #map-container {
            flex-grow: 1; position: relative;
            background-color: #eee; /* Miesto pre trávu */
            overflow: hidden;
        }

        .tile {
            position: absolute; width: 50px; height: 50px;
            image-rendering: pixelated; /* Pre ostré pixel-art obrázky */
            background-size: cover;
        }

        /* SKIN POSTAVY A MONŠTIER */
        .sprite {
            position: absolute; width: 48px; height: 48px;
            z-index: 10; transition: all 0.2s ease;
            image-rendering: pixelated;
        }

        .shake { animation: shake 0.3s; }
        @keyframes shake {
            0% { transform: translate(1px, 1px); }
            20% { transform: translate(-3px, 0px); }
            40% { transform: translate(3px, 2px); }
            100% { transform: translate(0px, 0px); }
        }

        /* BOJOVÁ OBRAZOVKA */
        .screen { display: none; height: 100%; flex-direction: column; padding: 20px; box-sizing: border-box; }
        .active { display: flex; }

        #battle-view { background: #fff; text-align: center; }
        .monster-render { width: 150px; height: 150px; margin: 20px auto; }

        /* UI PRVKY */
        .stats-panel { background: #000; color: #fff; padding: 10px; display: flex; justify-content: space-between; }
        .hp-bar-container { border: 3px solid #000; height: 20px; background: #ddd; margin: 10px 0; }
        .hp-fill { background: #000; height: 100%; width: 100%; transition: 0.4s; }
        
        button {
            background: #000; color: #fff; border: none; padding: 15px; 
            margin: 5px; cursor: pointer; font-weight: bold; font-family: var(--font);
        }
    </style>
</head>
<body>

<div id="game-viewport">
    <div class="stats-panel">
        <div>LV: <span id="ui-lvl">1</span></div>
        <div style="flex-grow:1; margin: 0 20px;">
            HP: <span id="ui-hp">100</span>
            <div class="hp-bar-container"><div id="ui-hp-fill" class="hp-fill"></div></div>
        </div>
        <div>💰: <span id="ui-gold">0</span></div>
    </div>

    <div id="screen-map" class="screen active">
        <div id="map-container">
            </div>
        <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 5px; padding: 10px;">
            <div></div><button onclick="move(0, -50)">HORE</button><div></div>
            <button onclick="move(-50, 0)">VĽAVO</button>
            <button onclick="move(0, 50)">DOLE</button>
            <button onclick="move(50, 0)">VPRAVO</button>
        </div>
    </div>

    <div id="screen-battle" class="screen">
        <h2 id="battle-monster-name">PRÍŠERA</h2>
        <img id="battle-monster-img" class="monster-render" src="" alt="monster">
        <div class="hp-bar-container"><div id="battle-monster-hp" class="hp-fill"></div></div>
        
        <div style="display: grid; grid-template-columns: 1fr 1fr;">
            <button onclick="fightAction('atk')">MEČ</button>
            <button onclick="fightAction('mag')">MÁGIA</button>
        </div>
        <div id="battle-log" style="font-size: 12px; margin-top: 10px; border: 1px solid #000; height: 60px; overflow: auto;"></div>
    </div>
</div>

<script>
    // --- KONFIGURÁCIA GRAFIKY (Tu zmeň názvy na svoje súbory na GitHube) ---
    const ASSETS = {
        player: 'hero_skin.png',       // Tvoj skin hrdinu
        grass: 'grass_tile.png',      // Obrázok trávy
        monster1: 'vlk.png',          // Skin monštra 1
        monster2: 'drak.png',         // Skin monštra 2
        placeholder: 'https://via.placeholder.com/50/000/fff?text=X' // Ak nemáš obrázok
    };

    const state = {
        p: { x: 150, y: 150, hp: 100, mHp: 100, lvl: 1, gold: 0, atk: 10 },
        enemy: null
    };

    // --- INICIALIZÁCIA MAPY ---
    function initMap() {
        const container = document.getElementById('map-container');
        container.innerHTML = '';

        // 1. Vygeneruj terén (pozadie)
        for (let i = 0; i < 100; i++) {
            const tile = document.createElement('div');
            tile.className = 'tile';
            // tile.style.backgroundImage = `url(${ASSETS.grass})`; // ODOKOMENTUJ KEĎ BUDEŠ MAŤ OBRÁZOK
            tile.style.left = (i % 10) * 50 + 'px';
            tile.style.top = Math.floor(i / 10) * 50 + 'px';
            tile.style.border = "0.1px solid #ddd"; // Pomocná mriežka
            container.appendChild(tile);
        }

        // 2. Pridaj hrdinu
        const hero = document.createElement('img');
        hero.id = 'player-sprite';
        hero.className = 'sprite';
        hero.src = ASSETS.player;
        hero.onerror = function() { this.src = ASSETS.placeholder; }; // Ak nenájde súbor, dá X
        hero.style.left = state.p.x + 'px';
        hero.style.top = state.p.y + 'px';
        container.appendChild(hero);

        spawnMonsters();
    }

    function spawnMonsters() {
        for(let i=0; i<3; i++) {
            const m = document.createElement('img');
            m.className = 'sprite monster-map';
            m.src = ASSETS.monster1;
            m.onerror = function() { this.src = ASSETS.placeholder; };
            m.style.left = Math.floor(Math.random()*7)*50 + 'px';
            m.style.top = Math.floor(Math.random()*7)*50 + 'px';
            m.onclick = () => startBattle();
            document.getElementById('map-container').appendChild(m);
        }
    }

    // --- POHYB ---
    function move(dx, dy) {
        state.p.x = Math.max(0, Math.min(350, state.p.x + dx));
        state.p.y = Math.max(0, Math.min(350, state.p.y + dy));
        
        const s = document.getElementById('player-sprite');
        s.style.left = state.p.x + 'px';
        s.style.top = state.p.y + 'px';
        
        if(Math.random() < 0.1) startBattle();
    }

    // --- BOJOVÝ SYSTÉM ---
    function startBattle() {
        state.enemy = { name: "DIVOKÝ VLK", hp: 50, mHp: 50, atk: 8, img: ASSETS.monster1 };
        document.getElementById('battle-monster-img').src = state.enemy.img;
        document.getElementById('battle-monster-name').innerText = state.enemy.name;
        
        switchScreen('screen-battle');
        updateUI();
    }

    function fightAction(type) {
        // Útok hráča
        const dmg = state.p.atk + Math.floor(Math.random()*5);
        state.enemy.hp -= dmg;
        document.getElementById('battle-monster-img').classList.add('shake');
        setTimeout(() => document.getElementById('battle-monster-img').classList.remove('shake'), 300);

        if(state.enemy.hp <= 0) {
            alert("VÍŤAZSTVO!");
            state.p.gold += 20;
            switchScreen('screen-map');
            initMap();
            return;
        }

        // Útok monštra
        state.p.hp -= state.enemy.atk;
        updateUI();

        if(state.p.hp <= 0) {
            alert("ZOMREL SI!");
            location.reload();
        }
    }

    // --- POMOCNÉ ---
    function updateUI() {
        document.getElementById('ui-hp').innerText = state.p.hp;
        document.getElementById('ui-hp-fill').style.width = (state.p.hp / state.p.mHp * 100) + "%";
        document.getElementById('ui-gold').innerText = state.p.gold;
        if(state.enemy) {
            document.getElementById('battle-monster-hp').style.width = (state.enemy.hp / state.enemy.mHp * 100) + "%";
        }
    }

    function switchScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    // Štart
    initMap();
    updateUI();
</script>

</body>
</html>
