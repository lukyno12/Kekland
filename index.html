<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Keksland: Orna Style RPG</title>
    <style>
        :root {
            --bg: #ffffff;
            --text: #000000;
            --border: 3px solid #000;
        }

        body {
            background: #f0f0f0;
            color: var(--text);
            font-family: 'Courier New', monospace;
            margin: 0;
            display: flex;
            justify-content: center;
        }

        #game-container {
            width: 100%;
            max-width: 450px;
            background: var(--bg);
            min-height: 100vh;
            border-left: var(--border);
            border-right: var(--border);
            display: flex;
            flex-direction: column;
        }

        .screen { display: none; padding: 20px; flex-direction: column; height: 100%; }
        .active { display: flex; }

        /* HEADER STATS */
        #header {
            border-bottom: var(--border);
            padding: 10px;
            background: #000;
            color: #fff;
            font-size: 0.8em;
            display: flex;
            justify-content: space-between;
        }

        /* MAPA */
        #map-area {
            position: relative;
            flex-grow: 1;
            background-image: radial-gradient(#ccc 1px, transparent 1px);
            background-size: 40px 40px;
            overflow: hidden;
            border-bottom: var(--border);
        }

        .entity {
            position: absolute;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            cursor: pointer;
            transition: all 0.2s;
        }

        #player {
            background: #000;
            color: #fff;
            border-radius: 50%;
            z-index: 10;
        }

        /* BOJ */
        .hp-container {
            width: 100%;
            border: 2px solid #000;
            height: 15px;
            margin: 10px 0;
        }
        .hp-bar { background: #000; height: 100%; width: 100%; transition: 0.3s; }
        
        .btn {
            background: #000;
            color: #fff;
            border: none;
            padding: 15px;
            margin: 5px 0;
            cursor: pointer;
            font-weight: bold;
            text-transform: uppercase;
        }

        .btn:disabled { background: #ccc; }

        #log {
            font-size: 0.7em;
            height: 100px;
            overflow-y: auto;
            border: 1px solid #000;
            padding: 5px;
            margin-top: 10px;
        }

        /* INVENTÁR */
        .item-card {
            border: 1px solid #000;
            margin: 5px 0;
            padding: 5px;
            font-size: 0.9em;
        }
    </style>
</head>
<body>

<div id="game-container">
    <div id="header">
        <span id="stat-lv">LVL: 1</span>
        <span id="stat-hp">HP: 100/100</span>
        <span id="stat-xp">XP: 0/50</span>
    </div>

    <div id="screen-map" class="screen active">
        <div id="map-area">
            <div id="player" class="entity" style="left: 200px; top: 200px;">⚔️</div>
            </div>
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap: 5px; padding: 10px;">
            <button class="btn" onclick="move('up')">HORE</button>
            <button class="btn" onclick="move('down')">DOLE</button>
            <button class="btn" onclick="move('left')">VĽAVO</button>
            <button class="btn" onclick="move('right')">VPRAVO</button>
        </div>
    </div>

    <div id="screen-battle" class="screen">
        <h2 id="enemy-name">Nepriateľ</h2>
        <div id="enemy-visual" style="font-size: 80px; text-align: center;">💀</div>
        <div class="hp-container"><div id="enemy-hp-bar" class="hp-bar"></div></div>
        
        <button class="btn" onclick="battleTurn('attack')">Fyzický Útok</button>
        <button class="btn" onclick="battleTurn('skill')">Zručnosť (Stamina)</button>
        
        <div id="log"></div>
    </div>

    <div id="screen-loot" class="screen">
        <h1>VÍŤAZSTVO!</h1>
        <p id="loot-text"></p>
        <button class="btn" onclick="closeLoot()">Späť na mapu</button>
    </div>
</div>

<script>
    // --- DATA ---
    const state = {
        player: {
            lvl: 1, hp: 100, maxHp: 100, xp: 0, nextXp: 50,
            atk: 10, def: 5, x: 200, y: 200, stamina: 100,
            weapon: { name: "Tupý meč", atk: 2 }
        },
        enemy: null,
        entities: []
    };

    const monsters = [
        { name: "Divoký pes", hp: 30, atk: 5, xp: 20, icon: "🐕" },
        { name: "Zatúlaný tieň", hp: 50, atk: 8, xp: 45, icon: "👤" },
        { name: "Temný Orna-Rytier", hp: 100, atk: 15, xp: 150, icon: "🛡️" }
    ];

    // --- LOGIKA MAPY ---
    function spawnMonsters() {
        const area = document.getElementById('map-area');
        // Vymazať staré okrem hráča
        document.querySelectorAll('.monster').forEach(m => m.remove());
        
        for(let i=0; i<4; i++) {
            let mData = monsters[Math.floor(Math.random() * monsters.length)];
            let x = Math.floor(Math.random() * 350);
            let y = Math.floor(Math.random() * 350);
            
            let div = document.createElement('div');
            div.className = 'entity monster';
            div.style.left = x + 'px';
            div.style.top = y + 'px';
            div.innerText = mData.icon;
            div.onclick = () => startBattle(mData);
            area.appendChild(div);
        }
    }

    function move(dir) {
        const step = 40;
        if(dir === 'up') state.player.y -= step;
        if(dir === 'down') state.player.y += step;
        if(dir === 'left') state.player.x -= step;
        if(dir === 'right') state.player.x += step;
        
        // Hranice mapy
        state.player.x = Math.max(0, Math.min(360, state.player.x));
        state.player.y = Math.max(0, Math.min(360, state.player.y));

        const p = document.getElementById('player');
        p.style.left = state.player.x + 'px';
        p.style.top = state.player.y + 'px';

        // Šanca na respawn príšer pri pohybe
        if(Math.random() < 0.2) spawnMonsters();
    }

    // --- LOGIKA BOJA ---
    function startBattle(m) {
        state.enemy = { ...m, maxHp: m.hp };
        document.getElementById('enemy-name').innerText = state.enemy.name;
        document.getElementById('enemy-visual').innerText = state.enemy.icon;
        document.getElementById('log').innerHTML = "Boj začal!";
        switchScreen('screen-battle');
        updateUI();
    }

    function battleTurn(type) {
        // Hráč útočí
        let dmg = state.player.atk + state.player.weapon.atk;
        if(type === 'skill') dmg = Math.floor(dmg * 1.5);
        
        state.enemy.hp -= dmg;
        addLog(`Udelil si ${dmg} poškodenia.`);

        if(state.enemy.hp <= 0) return win();

        // Príšera útočí
        let eDmg = Math.max(1, state.enemy.atk - Math.floor(state.player.def/2));
        state.player.hp -= eDmg;
        addLog(`${state.enemy.name} ti ubral ${eDmg} HP.`);

        if(state.player.hp <= 0) {
            alert("Koniec hry! Tvoja postava padla.");
            location.reload();
        }
        updateUI();
    }

    function win() {
        let gainedXp = state.enemy.xp;
        state.player.xp += gainedXp;
        
        document.getElementById('loot-text').innerText = `Získal si ${gainedXp} XP!`;
        
        if(state.player.xp >= state.player.nextXp) {
            levelUp();
        }

        switchScreen('screen-loot');
        updateUI();
    }

    function levelUp() {
        state.player.lvl++;
        state.player.xp = 0;
        state.player.nextXp += 50;
        state.player.maxHp += 20;
        state.player.hp = state.player.maxHp;
        state.player.atk += 5;
        state.player.def += 2;
        alert(`LEVEL UP! Teraz si Level ${state.player.lvl}`);
    }

    // --- POMOCNÉ FUNKCIE ---
    function updateUI() {
        document.getElementById('stat-lv').innerText = `LVL: ${state.player.lvl}`;
        document.getElementById('stat-hp').innerText = `HP: ${state.player.hp}/${state.player.maxHp}`;
        document.getElementById('stat-xp').innerText = `XP: ${state.player.xp}/${state.player.nextXp}`;
        
        if(state.enemy) {
            let pct = (state.enemy.hp / state.enemy.maxHp) * 100;
            document.getElementById('enemy-hp-bar').style.width = pct + "%";
        }
    }

    function addLog(msg) {
        const l = document.getElementById('log');
        l.innerHTML = msg + "<br>" + l.innerHTML;
    }

    function switchScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    function closeLoot() {
        switchScreen('screen-map');
        spawnMonsters();
    }

    // Štart
    spawnMonsters();
    updateUI();
</script>

</body>
</html>
