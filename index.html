<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Medieval Arena RPG</title>
    <style>
        /* CSS pre bielo-čierny Medieval štýl */
        body {
            background-color: #f4f1ea; /* Farba starého papiera */
            color: #1a1a1a;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            text-align: center;
        }

        #game-window {
            width: 90%;
            max-width: 600px;
            border: 4px solid #1a1a1a;
            background: white;
            padding: 20px;
            box-shadow: 15px 15px 0px #1a1a1a;
        }

        .hidden { display: none; }

        /* Karty postáv */
        .character-selection {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-top: 20px;
        }

        .char-card {
            border: 2px solid #1a1a1a;
            padding: 10px;
            cursor: pointer;
            transition: 0.2s;
            flex: 1;
        }

        .char-card:hover {
            background-color: #1a1a1a;
            color: white;
        }

        h1 { border-bottom: 3px solid #1a1a1a; padding-bottom: 10px; }
        
        button {
            background: #1a1a1a;
            color: white;
            border: none;
            padding: 15px 25px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 20px;
        }
    </style>
</head>
<body>

<div id="game-window">
    <div id="screen-menu">
        <h1>MEDIEVAL ARENA</h1>
        <p>Vyber si svoju postavu a vstúp do Arény Popola.</p>
        
        <div class="character-selection">
            <div class="char-card" onclick="selectClass('Zlodej', 80, 12, 20)">
                <h3>ZLODEJ</h3>
                <p>Menej HP<br>Viac Lucku</p>
            </div>
            <div class="char-card" onclick="selectClass('Kráľ', 100, 10, 10)">
                <h3>KRÁĽ</h3>
                <p>Balans<br>Viac zlata</p>
            </div>
            <div class="char-card" onclick="selectClass('Rytier', 140, 8, 5)">
                <h3>RYTIER</h3>
                <p>Veľa HP<br>Silná obrana</p>
            </div>
        </div>
    </div>

    <div id="screen-map" class="hidden">
        <h2>Mapa Sveta</h2>
        <p id="player-status"></p>
        <div id="map-grid">
            [ TU BUDE PIRÁTSKA MAPA ]
        </div>
        <button onclick="location.reload()">Reset Hry</button>
    </div>
</div>

<script>
    // Logika hry
    let player = {
        class: "",
        hp: 0,
        atk: 0,
        luck: 0,
        stamina: 100
    };

    function selectClass(name, hp, atk, luck) {
        player.class = name;
        player.hp = hp;
        player.atk = atk;
        player.luck = luck;

        document.getElementById('screen-menu').classList.add('hidden');
        document.getElementById('screen-map').classList.remove('hidden');
        
        document.getElementById('player-status').innerText = 
            `Postava: ${player.class} | HP: ${player.hp} | Stamina: ${player.stamina}%`;
        
        console.log("Hra začala za: ", player);
    }
</script>

</body>
</html>
